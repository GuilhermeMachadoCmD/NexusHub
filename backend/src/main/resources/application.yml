spring:
  application:
    name: nexushub

  datasource:
    url: jdbc:mysql://localhost:3306/nexusdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: nexus
    password: nexus123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: nexushub-super-secret-jwt-key-2024-must-be-32-chars-minimum
  expiration: 86400000  # 24 hours in ms

logging:
  level:
    com.nexus: DEBUG
    org.flywaydb: INFO
    org.springframework.security: INFO
